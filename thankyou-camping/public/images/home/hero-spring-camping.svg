<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 280" width="390" height="280" role="img" aria-label="?? ?? ????">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#Dff3d6"/>
      <stop offset="0.5" stop-color="#F2F3D8"/>
      <stop offset="1" stop-color="#FBE0EC"/>
